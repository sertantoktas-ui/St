<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dünya Saati – Önizleme</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  /* iPhone çerçevesi */
  .iphone {
    width: 390px;
    min-height: 844px;
    background: #0d0d1a;
    border-radius: 54px;
    border: 10px solid #2a2a2a;
    box-shadow:
      0 0 0 2px #1a1a1a,
      0 40px 80px rgba(0,0,0,0.8),
      inset 0 0 0 1px #3a3a3a;
    overflow: hidden;
    position: relative;
  }

  /* Notch */
  .notch {
    width: 126px;
    height: 34px;
    background: #2a2a2a;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 28px 4px;
    color: white;
    font-size: 12px;
    font-weight: 600;
  }
  .status-bar .time-status { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }

  /* App bar */
  .app-bar {
    text-align: center;
    padding: 8px 0 16px;
    color: white;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* İçerik */
  .content {
    padding: 0 16px;
    padding-bottom: 40px;
  }

  /* Ülke seç */
  .country-selector {
    background: #1e1e3a;
    border: 1px solid #3a3a6a;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .country-selector .flag { font-size: 24px; }
  .country-selector .name { color: white; font-size: 16px; flex: 1; }
  .country-selector .arrow { color: #00d4ff; font-size: 20px; }

  /* Ana saat kartı */
  .clock-card {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 24px;
    padding: 32px 20px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 28px;
  }
  .clock-country {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .clock-country .flag { font-size: 26px; }
  .clock-country .name { color: #a0a0c0; font-size: 17px; font-weight: 500; }
  .clock-tz {
    color: #e0e0ff;
    font-size: 11px;
    opacity: 0.6;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }
  .clock-time {
    color: #00d4ff;
    font-size: 52px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 4px;
    font-family: 'SF Mono', 'Courier New', monospace;
    line-height: 1;
    margin-bottom: 14px;
  }
  .clock-date {
    color: #c0c0e0;
    font-size: 15px;
  }

  /* Bölüm başlığı */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .section-title { color: white; font-size: 17px; font-weight: 700; }
  .add-btn {
    background: #1e1e3a;
    border: none;
    border-radius: 10px;
    color: #00d4ff;
    font-size: 13px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  /* Karşılaştırma kartları */
  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card {
    background: #1e1e3a;
    border: 1px solid #3a3a6a;
    border-radius: 14px;
    padding: 14px;
    width: calc(50% - 5px);
    text-align: center;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .card-flag { font-size: 20px; }
  .card-close { color: #606080; font-size: 14px; cursor: pointer; }
  .card-name { color: #a0a0c0; font-size: 11px; margin-bottom: 8px; }
  .card-time {
    color: #00d4ff;
    font-size: 20px;
    font-weight: 700;
    font-family: 'SF Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .card-date { color: #8080b0; font-size: 10px; }

  /* Home indicator */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    margin: 16px auto 8px;
  }
</style>
</head>
<body>

<div class="iphone">
  <div class="notch"></div>
  <div class="status-bar">
    <span class="time-status" id="status-time">9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app-bar">🕐 Dünya Saati</div>

  <div class="content">
    <!-- Ülke Seç -->
    <div class="country-selector">
      <span class="flag">🇹🇷</span>
      <span class="name">Türkiye</span>
      <span class="arrow">⌄</span>
    </div>

    <!-- Ana Saat -->
    <div class="clock-card">
      <div class="clock-country">
        <span class="flag">🇹🇷</span>
        <span class="name">Türkiye</span>
      </div>
      <div class="clock-tz">Europe/Istanbul &nbsp;|&nbsp; UTC+03:00</div>
      <div class="clock-time" id="main-clock">--:--:--</div>
      <div class="clock-date" id="main-date">--</div>
    </div>

    <!-- Karşılaştır -->
    <div class="section-header">
      <span class="section-title">Karşılaştır</span>
      <button class="add-btn">＋ Ekle</button>
    </div>

    <div class="cards-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-flag">🇹🇷</span>
          <span class="card-close">✕</span>
        </div>
        <div class="card-name">Türkiye</div>
        <div class="card-time" id="c0">--:--</div>
        <div class="card-date" id="d0">--</div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-flag">🇬🇧</span>
          <span class="card-close">✕</span>
        </div>
        <div class="card-name">İngiltere</div>
        <div class="card-time" id="c1">--:--</div>
        <div class="card-date" id="d1">--</div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-flag">🇯🇵</span>
          <span class="card-close">✕</span>
        </div>
        <div class="card-name">Japonya</div>
        <div class="card-time" id="c2">--:--</div>
        <div class="card-date" id="d2">--</div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-flag">🇺🇸</span>
          <span class="card-close">✕</span>
        </div>
        <div class="card-name">ABD - New York</div>
        <div class="card-time" id="c3">--:--</div>
        <div class="card-date" id="d3">--</div>
      </div>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
const zones = [
  'Europe/Istanbul',
  'Europe/London',
  'Asia/Tokyo',
  'America/New_York',
];

const DAYS = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];

function fmt(date, tz) {
  return new Intl.DateTimeFormat('tr-TR', {
    timeZone: tz,
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  }).format(date);
}

function fmtShort(date, tz) {
  return new Intl.DateTimeFormat('tr-TR', {
    timeZone: tz,
    hour: '2-digit', minute: '2-digit',
    hour12: false
  }).format(date);
}

function fmtDate(date, tz) {
  const d = new Intl.DateTimeFormat('tr-TR', {
    timeZone: tz,
    weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric'
  }).format(date);
  return d;
}

function fmtLongDate(date, tz) {
  return new Intl.DateTimeFormat('tr-TR', {
    timeZone: tz,
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }).format(date);
}

function tick() {
  const now = new Date();

  // Status bar saati
  document.getElementById('status-time').textContent =
    new Intl.DateTimeFormat('tr-TR', {
      timeZone: 'Europe/Istanbul',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).format(now);

  // Ana saat
  document.getElementById('main-clock').textContent = fmt(now, 'Europe/Istanbul');
  document.getElementById('main-date').textContent = fmtLongDate(now, 'Europe/Istanbul');

  // Karşılaştırma kartları
  zones.forEach((tz, i) => {
    document.getElementById('c' + i).textContent = fmtShort(now, tz);
    document.getElementById('d' + i).textContent = fmtDate(now, tz);
  });
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
